<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <title>Home - Players List</title>
        <style>
            table {
                border-collapse: collapse;
                width: 100%;
                margin-bottom: 20px;
            }
            th, td {
                border: 1px solid #ddd;
                padding: 12px;
                text-align: left;
            }
            th {
                background-color: #f2f2f2;
            }
            .player-card {
                margin-bottom: 20px;
                padding: 15px;
                border: 1px solid #ccc;
                border-radius: 5px;
            }
            .position-stats {
                margin-top: 10px;
                padding-left: 20px;
                border-left: 3px solid #007bff;
            }
        </style>
    </head>
    <body>
        <h1>Players List</h1>
        
        <!-- Table view -->
        <h2>Table View</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Height (cm)</th>
                    <th>Jersey #</th>
                    <th>Type</th>
                    <th>Position Specific Stats</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="player: ${players}">
                    <td th:text="${player.id}"></td>
                    <td th:text="${player.name}"></td>
                    <td th:text="${player.height}"></td>
                    <td th:text="${player.jerseyNumber}"></td>
                    <td th:text="${player.type}"></td>
                    <td>
                        <!-- Center stats -->
                        <div th:if="${player.center != null}">
                            <strong>Center Stats:</strong><br/>
                            Blocks: <span th:text="${player.center.blocks}"></span><br/>
                            Rebounds: <span th:text="${player.center.rebounds}"></span><br/>
                            Blocks/Game: <span th:text="${player.center.blocksPerGame}"></span><br/>
                            Rebounds/Game: <span th:text="${player.center.reboundsPerGame}"></span>
                        </div>
                        
                        <!-- Point Guard stats -->
                        <div th:if="${player.pointGuard != null}">
                            <strong>Point Guard Stats:</strong><br/>
                            Assists/Game: <span th:text="${player.pointGuard.assistsPerGame}"></span><br/>
                            3PT %: <span th:text="${player.pointGuard.threePointPercentage}"></span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <button type="button">Create player</button>
    </body>
</html>
