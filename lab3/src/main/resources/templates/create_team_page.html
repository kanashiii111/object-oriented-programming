<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создание команды</title>
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 200px;
            font-weight: bold;
        }
        input, select {
            padding: 5px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Создание новой команды</h1>
    
    <form th:action="@{/home/create/team}" th:object="${team}" method="post">
        
        <div class="form-group">
            <label>Имя:</label>
            <input type="text" th:field="*{name}" required/>
        </div>
        
        <div class="form-group">
            <label>Город:</label>
            <input type="text" th:field="*{city}" required/>
        </div>
        
        <div class="form-group">
            <button type="submit">Создать команду</button>
            <a th:href="@{/home}">Отмена</a>
        </div>
    </form>
</body>
</html>
