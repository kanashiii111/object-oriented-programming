<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Редактирование игрока</title>
        <link rel="stylesheet" th:href="@{/css/create_player_styles.css}"/>
        <script th:src="@{/js/edit_player_scripts.js}" defer></script>
    </head>
    <body>
        <h1>Редактирование игрока</h1>

        <div id="errorContainer" class="error-message" style="display: none;"></div><br>
        
        <form id="playerForm">

            <input type="hidden" id="playerId" th:value="${player.id}">
            <input type="hidden" id="playerType" th:value="${player.type}">
            
            <div class="form-group">
                <label>Имя:</label>
                <input type="text" name="name" id="name" th:value="${player.name}" required/>
                <span class="field-error" id="nameError"></span>
            </div>
            
            <div class="form-group">
                <label>Рост (см):</label>
                <input type="number" name="height" id="height" th:value="${player.height}" required/>
                <span class="field-error" id="heightError"></span>
            </div>
            
            <div class="form-group">
                <label>Игровой номер:</label>
                <input type="number" name="jerseyNumber" id="jerseyNumber" th:value="${player.jerseyNumber}" required/>
                <span class="field-error" id="jerseyNumberError"></span>
            </div>

            <div class="form-group">
                <label>Команда:</label>
                <select id="teamId" name="teamId" th:value="${player.teamId}" required>
                    <option value="">Выберите...</option>
                    <option th:each="team : ${teams}" 
                            th:value="${team.id}"
                            th:selected="${team.id == player.teamId}" 
                            th:text="${team.name} + ' (' + ${team.city} + ')'">
                    </option>
                </select>
                <span class="field-error" id="teamIdError"></span>
            </div>
            
            <div class="form-group">
                <button type="submit">Сохранить игрока</button>
                <a th:href="@{/home}">Отмена</a>
            </div>
        </form>
    </body>
</html>
