<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <title>Home - Players List</title>
        <style>
            table {
                border-collapse: collapse;
                width: 100%;
                margin-bottom: 20px;
            }
            th, td {
                border: 1px solid #ddd;
                padding: 12px;
                text-align: left;
            }
            th {
                background-color: #f2f2f2;
            }
            .player_row.selectedPlayer {
                background-color: #2196F3;
                color: #ffffff;
            }
            .player_row:hover {
                background-color: gray;
            }
            .player_row.selectedPlayer:hover {
                background-color: #0b7dda !important;
            }
            .team_row.selectedTeam {
                background-color: #2196F3;
                color: #ffffff;
            }
            .team_row:hover {
                background-color: gray;
            }
            .team_row.selectedTeam:hover {
                background-color: #0b7dda !important;
            }
            .position-stats {
                margin-top: 10px;
                padding-left: 20px;
                border-left: 3px solid #007bff;
            }
        </style>
        <script>
            let currentlySelectedPlayer = null;
            let currentlySelectedTeam = null;
            let playerId = null;
            let teamId = null;
            
            function selectPlayer(row) {
                if (currentlySelectedPlayer) {
                    currentlySelectedPlayer.classList.remove('selectedPlayer');
                }
                
                row.classList.add('selectedPlayer');
                currentlySelectedPlayer = row;
                
                playerId = currentlySelectedPlayer.getAttribute('data-id');
            }

            function selectTeam(row) {
                if (currentlySelectedTeam) {
                    currentlySelectedTeam.classList.remove('selectedTeam');
                }
                
                row.classList.add('selectedTeam');
                currentlySelectedTeam = row;
                
                teamId = currentlySelectedTeam.getAttribute('data-id');
            }

            function deleteSelectedPlayer() {
                if (playerId) {
                    if (confirm("Вы уверены, что хотите удалить этого игрока?")) {
                        fetch(`/home/delete/player/${playerId}`, {
                            method: 'POST'
                        }).then(response => {
                            if (response.ok) {
                                location.reload();
                            }
                        });
                    }
                } else {
                    alert("Выберите игрока");
                }
            }

            function deleteSelectedTeam() {
                if (teamId) {
                    if (confirm("Вы уверены, что хотите удалить эту команду?")) {
                        fetch(`/home/delete/team/${teamId}`, {
                            method: 'POST'
                        }).then(response => {
                            if (response.ok) {
                                location.reload();
                            }
                        });
                    }
                } else {
                    alert("Выберите команду");
                }
            }
        </script>
    </head>
    <body>

        <h1>Teams List</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>City</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="team: ${teams}" onclick="selectTeam(this)" th:data-id="${team.id}" class="team_row">
                    <td th:text="${team.id}"></td>
                    <td th:text="${team.name}"></td>
                    <td th:text="${team.city}"></td>
                </tr>
            </tbody>
        </table>

        <a th:href="@{/home/create/team}" type="button">Создать новую команду</a><br>
        <button onclick="deleteSelectedTeam()">Удалить выделенную команду</button>

        <!-- Players -->

        <h1>Players List</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Height (cm)</th>
                    <th>Jersey #</th>
                    <th>Type</th>
                    <th>Team ID</th>
                    <th>Position Specific Stats</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="player: ${players}" onclick="selectPlayer(this)" th:data-id="${player.id}" class="player_row">
                    <td th:text="${player.id}"></td>
                    <td th:text="${player.name}"></td>
                    <td th:text="${player.height}"></td>
                    <td th:text="${player.jerseyNumber}"></td>
                    <td th:text="${player.type}"></td>
                    <td th:text="${player.teamId}"></td>
                    <td>
                        <div th:if="${player.center != null}">
                            <strong>Center Stats:</strong><br/>
                            Blocks: <span th:text="${player.center.blocks}"></span><br/>
                            Rebounds: <span th:text="${player.center.rebounds}"></span><br/>
                            Blocks/Game: <span th:text="${player.center.blocksPerGame}"></span><br/>
                            Rebounds/Game: <span th:text="${player.center.reboundsPerGame}"></span>
                        </div>
                        
                        <div th:if="${player.pointGuard != null}">
                            <strong>Point Guard Stats:</strong><br/>
                            Assists/Game: <span th:text="${player.pointGuard.assistsPerGame}"></span><br/>
                            3PT %: <span th:text="${player.pointGuard.threePointPercentage}"></span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <a th:href="@{/home/create/player}" type="button">Создать нового игрока</a><br>
        <button onclick="deleteSelectedPlayer()">Удалить выделенного игрока</button>
    </body>
</html>
