<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <title>Home - Players List</title>
        <link rel="stylesheet" th:href="@{/css/home_page_styles.css}"/>
        <script th:src="@{/js/home_page_scripts.js}" defer></script>
    </head>
    <body>
        <h1>Список Команды</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Город</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="team: ${teams}" th:data-id="${team.id}" class="team_row">
                    <td th:text="${team.id}"></td>
                    <td th:text="${team.name}"></td>
                    <td th:text="${team.city}"></td>
                    <td>
                        <div class="team-action-btns">
                            <button class="show-players-btn" th:data-id="${team.id}" th:data-name="${team.name}">Показать игроков</button>
                            <button th:onclick="'redirectToUpdateTeamForm(' + ${team.id} + ')'">Редактировать</button>
                            <button th:onclick="'deleteSelectedTeam(' + ${team.id} + ')'">Удалить</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <button onclick="redirectToCreateTeamForm()">Создать новую команду</button>

        <!-- Players -->

        <h1>Список игроков</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Рост (cm)</th>
                    <th>Номер #</th>
                    <th>Тип</th>
                    <th>ID Команды</th>
                    <th>Статистика</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="player: ${players}" th:data-id="${player.id}" class="player_row">
                    <td th:text="${player.id}"></td>
                    <td th:text="${player.name}"></td>
                    <td th:text="${player.height}"></td>
                    <td th:text="${player.jerseyNumber}"></td>
                    <td th:text="${player.type}"></td>
                    <td th:text="${player.teamId}"></td>
                    <td>
                        <div th:if="${player.center != null}">
                            <strong>Статистика центрового:</strong><br/>
                            Блоки: <span th:text="${player.center.blocks}"></span><br/>
                            Подборы: <span th:text="${player.center.rebounds}"></span><br/>
                            Блоки за игру: <span th:text="${player.center.blocksPerGame}"></span><br/>
                            Подборы за игру: <span th:text="${player.center.reboundsPerGame}"></span>
                        </div>
                        
                        <div th:if="${player.pointGuard != null}">
                            <strong>Статистика разыгрывающего:</strong><br/>
                            Ассисты за игру: <span th:text="${player.pointGuard.assistsPerGame}"></span><br/>
                            Процент трехочковых: <span th:text="${player.pointGuard.threePointPercentage}"></span>
                        </div>
                    </td>
                    <td>
                        <div class="player-action-btns">
                            <button th:onclick="'redirectToPlayerMethods(' + ${player.id} + ')'">Методы</button>
                            <button th:onclick="'redirectToUpdatePlayerForm(' + ${player.id} + ')'">Редактировать</button>
                            <button th:onclick="'deleteSelectedPlayer(' + ${player.id} + ')'">Удалить</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <button onclick="redirectToCreatePlayerForm()">Создать нового игрока</button>

        <div id="teamPlayersModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Игроки команды: <span id="teamName"></span></h2>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <div class="modal-body">
                    <div id="teamPlayersList">
                        <p>Загрузка...</p>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
