<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создание игрока</title>
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 200px;
            font-weight: bold;
        }
        input, select {
            padding: 5px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Создание нового игрока</h1>
    
    <form th:action="@{/home/create/player}" th:object="${player}" method="post">
        
        <div class="form-group">
            <label>Имя:</label>
            <input type="text" th:field="*{name}" required/>
        </div>
        
        <div class="form-group">
            <label>Рост (см):</label>
            <input type="number" th:field="*{height}" required/>
        </div>
        
        <div class="form-group">
            <label>Игровой номер:</label>
            <input type="number" th:field="*{jerseyNumber}" required/>
        </div>
        
        <div class="form-group">
            <label>Амплуа:</label>
            <select id="type" th:field="*{type}" required>
                <option value="">Выберите...</option>
                <option value="center">Центровой</option>
                <option value="point_guard">Разыгрывающий</option>
            </select>
        </div>

        <div class="form-group">
            <label>Команда:</label>
            <select id="team" th:field="*{teamId}" required>
                <option value="">Выберите...</option>
                <option th:each="team : ${teams}" 
                        th:value="${team.id}" 
                        th:text="${team.name} + ' (' + ${team.city} + ')'">
                </option>
            </select>
        </div>
        
        <div class="form-group">
            <button type="submit">Создать игрока</button>
            <a th:href="@{/home}">Отмена</a>
        </div>
    </form>
</body>
</html>
