services:
  postgres:
    image: postgres:18.3-bookworm
    container_name: lab4-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/postgres-data:/var/lib/postgresql
    restart: always
  postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
  backend:
    build: ./backend
    container_name: lab4-env-backend
    command: uvicorn api.main:app --port 5000 --host 0.0.0.0 --reload
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - PYTHONPATH=/app
    depends_on:
      - postgres
  gateway:
    build: ./gateway
    container_name: lab4-env-gateway
    command: go run ./cmd/main.go
    volumes:
      - ./gateway:/app
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/app/internal/proxy/config/config.yaml
    depends_on:
      - backend